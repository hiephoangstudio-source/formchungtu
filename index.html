<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống In Biểu Mẫu 2H Studio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Times New Roman', serif; 
            color: #000; 
            background-color: #525659; 
            margin: 0; padding: 0; 
        }

        /* --- TOOLBAR --- */
        .actions-container { 
            position: sticky; top: 0; 
            display: flex; align-items: center; justify-content: center; gap: 15px;
            width: 100%; background-color: #343a40; padding: 10px; z-index: 2000; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .control-group { display: flex; align-items: center; gap: 8px; background: #495057; padding: 5px 12px; border-radius: 4px; color: white; }
        .control-label { font-size: 14px; font-weight: bold; }
        .action-btn { background-color: #0d6efd; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; height: 38px; font-weight: bold; }
        .action-btn:hover { background-color: #0b5ed7; }
        .mode-select { padding: 0 10px; border-radius: 4px; border: 1px solid #ccc; height: 38px; cursor: pointer; outline: none; font-weight: 500; }
        .hidden { display: none !important; }

        /* --- PAGE SETUP --- */
        .page-wrapper { display: flex; justify-content: center; padding: 30px; min-height: 100vh; }
        .a4-page {
            width: 210mm;
            min-height: 296mm; 
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            margin: auto;
            overflow: hidden; 
            position: relative;
            padding: 10mm 12mm; /* Padding mặc định cho Form 1 & 2 */
        }

        .form-container { display: none !important; width: 100%; height: 100%; }
        .form-container.active { display: block !important; }

        /* UTILS */
        .bold { font-weight: bold; }
        .italic { font-style: italic; }
        .center { text-align: center; }
        .right { text-align: right; }
        .uppercase { text-transform: uppercase; }

        /* ==================== CSS FORM 1 (BẢN GIAO NHẬN) ==================== */
        
        #form-handover { padding: 0; font-size: 10pt; } 
        #form-handover .header-section { display: flex; justify-content: space-between; margin-bottom: 5px; }
        #form-handover .main-title { font-size: 18pt; font-weight: bold; text-align: center; text-transform: uppercase; margin: 0; }
        #form-handover table { width: 100%; border-collapse: collapse; margin-top: 5px; margin-bottom: 5px; font-size: 10pt; }
        #form-handover th, #form-handover td { border: 1px solid #000; padding: 2px 4px; text-align: center; vertical-align: middle; }
        #form-handover .sig-block { margin-top: 10px; }
        #form-handover .sig-header-row { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: flex-end;}
        #form-handover .sig-section-title { font-weight: bold; font-size: 11pt; text-decoration: underline; }
        #form-handover .sig-grid { display: flex; justify-content: space-between; text-align: center; }
        #form-handover .sig-col { width: 19%; }
        #form-handover .sig-role { font-weight: bold; font-size: 10pt; margin-bottom: 2px; }
        #form-handover .sig-note { font-style: italic; font-size: 9pt; }
        #form-handover .sig-space { height: 40px; }

        /* ==================== CSS FORM 2 (HÓA ĐƠN - ĐÃ CHỈNH SỬA LẠI) ==================== */
        
        /* Layout chia đôi trang: Tăng khoảng giữa lên 10% để rộng rãi hơn */
        .voucher-section-half { height: 45%; display: flex; flex-direction: column; padding: 0 2px; overflow: hidden; justify-content: space-between; }
        .voucher-section-half.top { padding-bottom: 5px; }
        .voucher-section-half.bottom { padding-top: 5px; }
        
        /* Khoảng cách giữa 2 liên: Tăng lên 10% */
        .middle-gap { height: 10%; display: flex; align-items: center; justify-content: center; width: 100%; }
        .cut-line { width: 100%; border-top: 1px dashed #000; height: 1px; }

        #form-invoice { padding: 0; font-size: 10pt; height: 100%; } /* Tăng size chữ lên 10pt cho rõ */
        #form-invoice .header-section { display: flex; justify-content: space-between; margin-bottom: 5px; }
        #form-invoice .main-title { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; text-align: center; margin-bottom: 5px; line-height: 1.2; }
        
        #form-invoice .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 5px; }
        #form-invoice .form-row { display: flex; align-items: baseline; margin-bottom: 4px; }
        #form-invoice .label { font-weight: normal; min-width: 70px; }
        #form-invoice .value { flex: 1; border-bottom: 1px dotted #000; padding-left: 5px; font-weight: bold; font-size: 10pt; }
        
        #form-invoice table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 10pt; flex-grow: 1; }
        /* Tăng padding và height cho ô bảng để bảng giãn ra */
        #form-invoice th, #form-invoice td { border: 1px solid #000; padding: 5px 4px; vertical-align: middle; }
        #form-invoice th { font-weight: bold; background: #f8f9fa; }
        #form-invoice td { height: 26px; } /* Chiều cao tối thiểu mỗi dòng */
        
        #form-invoice .signatures { display: flex; justify-content: space-between; text-align: center; margin-top: 10px; }
        #form-invoice .sig-col { width: 19%; }
        #form-invoice .sig-title { font-weight: bold; font-size: 8.5pt; text-transform: uppercase; margin-bottom: 2px; }
        #form-invoice .sig-note { font-style: italic; font-size: 8.5pt; margin: 0; } 
        /* Tăng khoảng trống ký tên lên 100px để đẩy form xuống cuối trang */
        #form-invoice .sig-space { height: 100px; }

        /* ==================== CSS FORM 3 (GIỮ NGUYÊN) ==================== */
        
        #form-work-wrapper { 
            padding: 3mm 3mm !important; 
            height: 100%;
            display: flex; flex-direction: column;
        }

        #form-work .header-section { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px solid #ccc; 
            padding-bottom: 2px; margin-bottom: 2px; 
        }
        #form-work .studio-name { font-size: 10pt; font-weight: bold; display: block; margin-bottom: 1px; }
        #form-work .studio-info { font-size: 9pt; display: block; margin-bottom: 0; }
        
        #form-work .main-title { 
            font-size: 14pt; font-weight: bold; text-align: center; 
            margin: 3px 0 1px 0; text-transform: uppercase; line-height: 1.1; 
        }
        #form-work .date-sub { font-size: 9pt; font-style: italic; text-align: center; margin-bottom: 4px; }
        #form-work .section-title { 
            font-size: 9pt; font-weight: bold; text-transform: uppercase; 
            background-color: #f0f0f0; border-left: 3px solid #333; 
            padding: 2px 5px; margin: 4px 0 2px 0; 
        }
        #form-work .info-grid { display: flex; flex-wrap: wrap; margin-bottom: 2px; font-size: 9pt; line-height: 1.2; }
        #form-work .info-row { width: 100%; display: flex; align-items: baseline; margin-bottom: 1px; }
        #form-work .label { font-weight: bold; min-width: 70px; }
        #form-work .value { flex: 1; border-bottom: 1px dotted #999; padding-left: 5px; font-weight: normal; }
        #form-work .value.bold { font-weight: bold; }
        #form-work table { width: 100%; border-collapse: collapse; font-size: 8.5pt; } 
        #form-work th, #form-work td { border: 1px solid #000; padding: 1px 3px; vertical-align: middle; }
        #form-work th { background-color: #eee; font-weight: bold; text-align: center; height: 18px; }
        #form-work .ekip-table td { height: 16px; }
        #form-work .check-table .col-time { width: 9%; text-align: center; font-weight: bold; background: #f9f9f9; }
        #form-work .check-table .col-role { width: 12%; text-align: center; font-weight: bold; }
        #form-work .check-table .col-check { width: 35px; text-align: center; }
        #form-work .eval-table th { font-size: 8.5pt; }
        #form-work .footer-note { font-size: 8.5pt; font-style: italic; margin-top: 3px; text-align: justify; line-height: 1.1; }
        #form-work .signatures { display: flex; justify-content: space-between; margin-top: 8px; text-align: center; }
        #form-work .sig-col { width: 24%; }
        #form-work .sig-title { font-size: 9pt; font-weight: bold; text-transform: uppercase; margin-bottom: 1px; }
        #form-work .sig-note { font-size: 8.5pt; font-style: italic; font-weight: normal; margin-bottom: 40px; }
        #form-work .sig-name { font-size: 9pt; font-weight: bold; }


        @media print {
            body, html { margin: 0; padding: 0; background: #fff; }
            .actions-container { display: none !important; }
            .page-wrapper { display: block; padding: 0; margin: 0; }
            .a4-page { box-shadow: none; margin: 0; width: 100%; height: auto; }
            .form-container { display: none !important; }
            .form-container.active { display: block !important; }
            #form-work-wrapper { padding: 3mm 3mm !important; }
        }
    </style>
</head>
<body>

    <!-- TOOLBAR -->
    <div class="actions-container">
        <div class="control-group">
            <span class="control-label">📑 Chọn Mẫu:</span>
            <select id="main-form-selector" class="mode-select" onchange="switchForm(this.value)">
                <option value="form-handover">1. Biên Bản Giao Nhận</option>
                <option value="form-invoice">2. Hóa Đơn Bán Hàng</option>
                <option value="form-work">3. Xác Nhận Công Việc</option>
            </select>
        </div>

        <div id="invoice-controls" class="control-group hidden">
            <span class="control-label">🖨️ Chế độ In HĐ:</span>
            <select id="invoice-print-mode" class="mode-select" onchange="changeInvoiceMode(this.value)">
                <option value="both">In 2 Liên (A4)</option>
                <option value="lien1">Chỉ Liên 1</option>
                <option value="lien2">Chỉ Liên 2</option>
            </select>
        </div>

        <button onclick="window.print()" class="action-btn">🖨️ In Ngay</button>
        <button onclick="downloadPDF()" class="action-btn">📥 Tải PDF</button>
    </div>

    <!-- MAIN PAGE -->
    <div class="page-wrapper">
        <div class="a4-page" id="print-area">
            <div id="form-handover" class="form-container"></div>
            <div id="form-invoice" class="form-container"></div>
            <!-- Wrapper Form 3 với padding 3mm -->
            <div id="form-work" class="form-container active">
                <div id="form-work-wrapper">
                    <!-- Nội dung Form 3 được JS tạo ra -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let currentFormTitle = "";

        const dataCommon = {
            studio_ten: params.get('ten_studio') || "2H STUDIO",
            studio_dc: params.get('dia_chi_studio') || "85 Hồ Văn Huê, P.9, Q.PN, TP.HCM",
            studio_hl: params.get('hotline_studio') || "037 893 2005",
            ngay_lap: params.get('ngay') || params.get('ngay_tao') || new Date().toISOString().split('T')[0]
        };

        const dataHandover = { id: params.get('id') || ".........." };
        const dataInvoice = {
            so_phieu: params.get('so_hd') || "..........",
            ma_hd: params.get('ma_hd') || params.get('id') || "..........",
            khach_ten: params.get('khach') || "",
            khach_sdt: params.get('sdt') || "",
            khach_dc: params.get('diachi') || ""
        };
        const dataWork = {
            id_cv: params.get('id') || "..........",
            khach_ten: params.get('khach') || "",
            khach_sdt: params.get('sdt') || "",
            khach_dc: params.get('diachi') || "",
            dich_vu: params.get('dv') || "",
            goi_chup: params.get('goi') || "",
            ngay_lam: params.get('ngay_lam') || "",
            time: params.get('time') || "",
            dia_diem: params.get('diadiem') || "Studio",
            ghi_chu: params.get('ghichu') || "",
            nv_chinh: params.get('nv') || ""
        };

        // 1. RENDER FORM GIAO NHẬN (GIỮ NGUYÊN)
        function renderHandover() {
            const container = document.getElementById('form-handover');
            const d = new Date(dataCommon.ngay_lap);
            let rowsHtml = '';
            for (let i=0; i<25; i++) rowsHtml += `<tr><td>${i+1}</td><td></td><td></td><td></td><td></td><td></td></tr>`;

            const createSigBlock = (title, actionDate) => `
                <div class="sig-block">
                    <div class="sig-header-row"><span class="sig-section-title">${title}</span><span class="italic">${actionDate}</span></div>
                    <div class="sig-grid">
                        <div class="sig-col"><div class="sig-role">Người lập phiếu</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                        <div class="sig-col"><div class="sig-role">Người giao hàng</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                        <div class="sig-col"><div class="sig-role">Người nhận hàng</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                        <div class="sig-col"><div class="sig-role">Kế toán trưởng</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                        <div class="sig-col"><div class="sig-role">Đại diện Studio</div><div class="sig-note">(Ký, đóng dấu)</div><div class="sig-space"></div></div>
                    </div>
                </div>`;

            container.innerHTML = `
                <div class="header-section">
                    <div><span class="bold" style="font-size:11pt">${dataCommon.studio_ten}</span><br>ĐC: ${dataCommon.studio_dc}<br>Hotline: ${dataCommon.studio_hl}</div>
                    <div class="right">Số: <span class="bold">${dataHandover.id}</span></div>
                </div>
                <h1 class="main-title">BẢN GIAO NHẬN VẬT TƯ, TRANG PHỤC</h1>
                <div class="center italic" style="margin-bottom:10px">Ngày ${d.getDate()} tháng ${d.getMonth()+1} năm ${d.getFullYear()}</div>
                <div style="margin-bottom:10px;">
                    <div style="display:flex; margin-bottom:5px"><span class="bold" style="min-width:150px">Người nhận hàng:</span><span style="border-bottom:1px dotted #000; flex:1"></span></div>
                    <div style="display:flex; margin-bottom:5px"><span class="bold" style="min-width:150px">Địa chỉ (Bộ phận):</span><span style="border-bottom:1px dotted #000; flex:1"></span></div>
                    <div style="display:flex; margin-bottom:5px"><span class="bold" style="min-width:150px">Lý do xuất hàng:</span><span style="border-bottom:1px dotted #000; flex:1"></span></div>
                </div>
                <table><thead><tr><th style="width:40px">STT</th><th>Tên hàng hóa - Quy cách</th><th style="width:50px">SL</th><th style="width:100px">Đơn giá</th><th style="width:100px">Thành tiền</th><th style="width:100px">Ghi chú</th></tr></thead><tbody>${rowsHtml}</tbody></table>
                ${createSigBlock("1. Xuất hàng:", "Xuất ngày...... tháng ...... năm ......")}
                ${createSigBlock("2. Nhập hàng:", "Nhập ngày...... tháng ...... năm ......")}
                ${createSigBlock("3. Hàng mất hỏng:", "Ký nhận ngày...... tháng ...... năm ......")}
            `;
        }

        // 2. RENDER FORM HÓA ĐƠN (ĐÃ CẬP NHẬT: TĂNG SỐ DÒNG LÊN 8 VÀ CĂN CHỈNH CHIỀU CAO)
        function createInvoiceHtml() {
            const d = new Date(dataCommon.ngay_lap);
            const dateStr = `Ngày ${d.getDate().toString().padStart(2,'0')} tháng ${(d.getMonth()+1).toString().padStart(2,'0')} năm ${d.getFullYear()}`;
            let rowsHtml = '';
            // Tăng số dòng lên 8 để bảng dài hơn, đẩy nội dung xuống
            for(let i=0; i<8; i++) rowsHtml += `<tr><td class="center">${i+1}</td><td></td><td></td><td></td><td></td></tr>`;

            return `
                <div>
                    <div class="header-section">
                        <div><span class="bold" style="font-size:11pt">${dataCommon.studio_ten}</span><br>Hotline: ${dataCommon.studio_hl}</div>
                        <div class="right">Quyển số: ..........<br>Số: <span class="bold">${dataInvoice.so_phieu}</span><br>Mã HĐ: <span class="bold">${dataInvoice.ma_hd}</span></div>
                    </div>
                    <h1 class="main-title">HÓA ĐƠN BÁN HÀNG</h1>
                    <div class="center italic" style="font-size:9pt; margin-bottom:10px">${dateStr}</div>
                    <div class="info-grid">
                        <div><div class="form-row"><span class="label">Người bán:</span><span class="value">${dataCommon.studio_ten}</span></div><div class="form-row"><span class="label">SĐT:</span><span class="value">${dataCommon.studio_hl}</span></div><div class="form-row"><span class="label">Địa chỉ:</span><span class="value">${dataCommon.studio_dc}</span></div></div>
                        <div><div class="form-row"><span class="label">Người mua:</span><span class="value">${dataInvoice.khach_ten}</span></div><div class="form-row"><span class="label">SĐT:</span><span class="value">${dataInvoice.khach_sdt}</span></div><div class="form-row"><span class="label">Địa chỉ:</span><span class="value">${dataInvoice.khach_dc}</span></div></div>
                    </div>
                    <table><thead><tr><th style="width:35px">STT</th><th>TÊN HÀNG - DỊCH VỤ</th><th style="width:40px">SL</th><th style="width:80px">ĐƠN GIÁ</th><th style="width:90px">THÀNH TIỀN</th></tr></thead><tbody>${rowsHtml}</tbody><tfoot><tr><td colspan="4" class="right bold">TỔNG CỘNG</td><td class="bold"></td></tr></tfoot></table>
                    <div style="margin-top:5px; font-style:italic; font-size:10pt">Thành tiền (viết bằng chữ): .........................................................................................................................</div>
                </div>
                <div class="signatures">
                    <div class="sig-col"><div class="sig-title">NGƯỜI LẬP PHIẾU</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                    <div class="sig-col"><div class="sig-title">NGƯỜI MUA HÀNG</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                    <div class="sig-col"><div class="sig-title">THỦ QUỸ</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                    <div class="sig-col"><div class="sig-title">KẾ TOÁN</div><div class="sig-note">(Ký, họ tên)</div><div class="sig-space"></div></div>
                    <div class="sig-col"><div class="sig-title">ĐẠI DIỆN ĐƠN VỊ</div><div class="sig-note">(Ký, đóng dấu)</div><div class="sig-space"></div></div>
                </div>
            `;
        }
        function renderInvoice() {
            const container = document.getElementById('form-invoice');
            const lien1 = document.createElement('div'); lien1.id='inv-lien-1'; lien1.className='voucher-section-half top'; lien1.innerHTML=createInvoiceHtml();
            const sep = document.createElement('div'); sep.id='inv-separator'; sep.className='middle-gap'; sep.innerHTML='<div class="cut-line"></div>';
            const lien2 = document.createElement('div'); lien2.id='inv-lien-2'; lien2.className='voucher-section-half bottom'; lien2.innerHTML=createInvoiceHtml();
            container.innerHTML=''; container.appendChild(lien1); container.appendChild(sep); container.appendChild(lien2);
        }

        // 3. RENDER FORM XÁC NHẬN CÔNG VIỆC (GIỮ NGUYÊN)
        function renderWorkConf() {
            const container = document.getElementById('form-work-wrapper');
            const d = new Date(dataCommon.ngay_lap);
            const dateStr = `Ngày ${d.getDate().toString().padStart(2,'0')} tháng ${(d.getMonth()+1).toString().padStart(2,'0')} năm ${d.getFullYear()}`;
            const roles = ["Nhiếp ảnh gia", "Makeup", "Tư vấn viên"];
            let ekipRows = '';
            for(let i=0; i<3; i++) {
                let name = (i===0) ? dataWork.nv_chinh : "";
                ekipRows += `<tr><td class="center">${i+1}</td><td>${roles[i]}</td><td>${name}</td></tr>`;
            }

            container.innerHTML = `
                <div class="header-section">
                    <div><span class="studio-name">${dataCommon.studio_ten}</span><span class="studio-info">ĐC: ${dataCommon.studio_dc}</span><span class="studio-info">Hotline: ${dataCommon.studio_hl}</span></div>
                    <div class="right"><span class="bold">Số: ${dataWork.id_cv}</span></div>
                </div>
                <h1 class="main-title">BIÊN BẢN XÁC NHẬN CÔNG VIỆC</h1>
                <div class="date-sub">${dateStr}</div>
                <div class="info-grid">
                    <div class="info-row"><span class="label">Khách hàng:</span><span class="value bold" style="margin-right:10px">${dataWork.khach_ten}</span><span class="label">SĐT:</span><span class="value bold" style="flex:0 0 100px">${dataWork.khach_sdt}</span></div>
                    <div class="info-row"><span class="label">Địa chỉ:</span><span class="value">${dataWork.khach_dc}</span></div>
                </div>
                <div class="section-title">I. THÔNG TIN DỊCH VỤ</div>
                <div class="info-grid">
                    <div class="info-row"><span class="label">Hạng mục:</span><span class="value">${dataWork.dich_vu}</span><span class="label" style="margin-left:10px">Gói chụp:</span><span class="value">${dataWork.goi_chup}</span></div>
                    <div class="info-row"><span class="label">Ngày làm:</span><span class="value bold">${dataWork.ngay_lam}</span><span class="label" style="margin-left:10px">Thời gian:</span><span class="value">${dataWork.time}</span></div>
                    <div class="info-row"><span class="label">Địa điểm:</span><span class="value">${dataWork.dia_diem}</span></div>
                    <div class="info-row"><span class="label">Ghi chú:</span><span class="value italic">${dataWork.ghi_chu}</span></div>
                </div>
                <div class="section-title">II. DANH SÁCH NHÂN VIÊN THỰC HIỆN (EKIP)</div>
                <table class="ekip-table"><thead><tr><th style="width:40px">STT</th><th style="width:150px">Vị trí / Công việc</th><th>Tên nhân viên</th></tr></thead><tbody>${ekipRows}</tbody></table>

        function switchForm(formId) {
            document.querySelectorAll('.form-container').forEach(el => el.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            const invControls = document.getElementById('invoice-controls');
            if(formId === 'form-invoice') {
                invControls.classList.remove('hidden');
                currentFormTitle = "HD_" + dataInvoice.ma_hd;
            } else {
                invControls.classList.add('hidden');
                if(formId === 'form-work') currentFormTitle = "CV_" + dataWork.id_cv;
                else currentFormTitle = "GIAONHAN_" + dataHandover.id;
            }
            document.title = currentFormTitle;
        }

        function changeInvoiceMode(mode) {
            const l1 = document.getElementById('inv-lien-1');
            const l2 = document.getElementById('inv-lien-2');
            const sep = document.getElementById('inv-separator');
            if(l1) {
                l1.classList.remove('hidden'); l2.classList.remove('hidden'); sep.classList.remove('hidden');
                if(mode==='lien1') { l2.classList.add('hidden'); sep.classList.add('hidden'); }
                if(mode==='lien2') { l1.classList.add('hidden'); sep.classList.add('hidden'); }
            }
        }

        function downloadPDF() {
            const activeForm = document.querySelector('.form-container.active');
            let filename = currentFormTitle;
            if(activeForm.id === 'form-invoice') {
                const mode = document.getElementById('invoice-print-mode').value;
                if(mode !== 'both') filename += '_' + mode;
            }
            const opt = { margin: 0, filename: filename + '.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().from(activeForm).set(opt).save();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderHandover();
            renderInvoice();
            renderWorkConf();
            switchForm('form-work');
            document.getElementById('main-form-selector').value = 'form-work';
        });

    </script>
